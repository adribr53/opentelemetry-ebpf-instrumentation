routes:
  patterns:
    - /basic/:rnd
  unmatched: path
  ignored_patterns:
    - /metrics
  ignore_mode: traces
otel_metrics_export:
  endpoint: http://otelcol:4318
otel_traces_export:
  endpoint: http://jaeger:4318
  otel_sdk_log_level: debug
prometheus_export:
  port: 8999
  features:
    - application
attributes:
  kubernetes:
    cluster_name: obi-k8s-test-cluster
    resource_labels:
      deployment.environment: ["deployment.environment"]
  select:
    "*":
      include: ["*"]
